<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" preserveAspectRatio="xMidYMid slice">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#fdf8ee"/>
            <stop offset="100%" stop-color="#f6ecd6"/>
        </linearGradient>
        <radialGradient id="wash" cx="0.18" cy="0" r="0.7">
            <stop offset="0%" stop-color="#c9621f" stop-opacity="0.18"/>
            <stop offset="60%" stop-color="#c9621f" stop-opacity="0"/>
        </radialGradient>
        <filter id="noise">
            <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
            <feColorMatrix values="0 0 0 0 0.17  0 0 0 0 0.12  0 0 0 0 0.07  0 0 0 0.18 0"/>
        </filter>
    </defs>

    <rect width="1200" height="630" fill="url(#bg)"/>
    <rect width="1200" height="630" fill="url(#wash)"/>
    <rect width="1200" height="630" filter="url(#noise)" opacity="0.4"/>

    <!-- Brand mark -->
    <g transform="translate(80,70)">
        <rect x="0" y="0" width="56" height="56" rx="10" fill="#2b1f12"/>
        <path d="M8 38 L 17 26 L 24 33 L 32 18 L 40 30 L 48 22" fill="none" stroke="#fdf8ee" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="17" cy="26" r="2" fill="#c9621f"/>
        <circle cx="32" cy="18" r="2" fill="#c9621f"/>
        <circle cx="48" cy="22" r="2" fill="#c9621f"/>
        <text x="76" y="36" font-family="Newsreader, Georgia, serif" font-style="italic" font-weight="500" font-size="36" fill="#2b1f12">kharcha</text>
    </g>

    <!-- Eyebrow -->
    <g transform="translate(80,200)">
        <line x1="0" y1="14" x2="40" y2="14" stroke="#c9621f" stroke-opacity="0.6" stroke-width="1"/>
        <text x="56" y="20" font-family="ui-monospace, 'Geist Mono', monospace" font-size="18" letter-spacing="6" fill="#a04a13">A HOUSEHOLD LEDGER, KEPT BY HAND</text>
    </g>

    <!-- Display headline -->
    <g transform="translate(80,260)">
        <text font-family="Newsreader, Georgia, serif" font-style="italic" font-weight="500" font-size="140" letter-spacing="-4" fill="#2b1f12">
            <tspan x="0" dy="0">Where the</tspan>
            <tspan x="0" dy="130"><tspan fill="#c9621f" font-weight="600">month</tspan>, went<tspan fill="#c9621f" font-weight="600">.</tspan></tspan>
        </text>
    </g>

    <!-- Footer line -->
    <g transform="translate(80,560)">
        <text font-family="ui-monospace, 'Geist Mono', monospace" font-size="18" letter-spacing="6" fill="#6b5b46">EXPENSE.IUKHAN.TECH · PAKISTAN</text>
    </g>

    <!-- Decorative receipt corner -->
    <g transform="translate(820,160) rotate(-4)">
        <rect x="0" y="0" width="280" height="380" rx="3" fill="#fffbf2" stroke="#e8dcc1"/>
        <text x="22" y="60" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="30" fill="#2b1f12">Imtiaz</text>
        <text x="22" y="86" font-family="ui-monospace, 'Geist Mono', monospace" font-size="12" letter-spacing="2.5" fill="#a89478">KARACHI · 17:42</text>
        <g font-family="ui-monospace, 'Geist Mono', monospace" font-size="16" fill="#2b1f12">
            <text x="22" y="140">Milk 1L</text><text x="258" y="140" text-anchor="end">540</text>
            <text x="22" y="170">Atta 10kg</text><text x="258" y="170" text-anchor="end">1,820</text>
            <text x="22" y="200">Soap</text><text x="258" y="200" text-anchor="end">360</text>
            <text x="22" y="230">Rooh Afza</text><text x="258" y="230" text-anchor="end">440</text>
            <text x="22" y="260">Eggs</text><text x="258" y="260" text-anchor="end">720</text>
        </g>
        <line x1="22" y1="280" x2="258" y2="280" stroke="#d8c7a3" stroke-dasharray="3 3"/>
        <text x="22" y="312" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="22" fill="#2b1f12">Total</text>
        <text x="258" y="312" font-family="ui-monospace, 'Geist Mono', monospace" font-size="22" font-weight="500" text-anchor="end" fill="#2b1f12">Rs 3,880</text>
        <circle cx="32" cy="350" r="5" fill="#c9621f"/>
        <text x="46" y="355" font-family="ui-monospace, 'Geist Mono', monospace" font-size="11" letter-spacing="2" fill="#a04a13">SCANNED · ROUTED TO HOME</text>
    </g>
</svg>
